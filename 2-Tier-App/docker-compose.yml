version: "3.8"  # Compose file format version

services:
  # -----------------------------
  # Backend Service (Node.js API)
  # -----------------------------
  backend:
    build: ./backend              # Build image using Dockerfile in backend/
    container_name: ecommerce-backend  # Optional: custom container name

    ports:
      - "5000:5000"              # Map host:container (access API on localhost:5000)

    networks:
      - app-network              # Connect to shared network

    # Optional (recommended later)
    # environment:
    #   - PORT=5000

  # -----------------------------
  # Frontend Service (React + Nginx)
  # -----------------------------
  frontend:
    build: ./frontend            # Build image using Dockerfile in frontend/
    container_name: ecommerce-frontend

    ports:
      - "3000:80"                # Access UI on localhost:3000 (nginx runs on 80 inside)

    depends_on:
      - backend                  # Ensures backend starts before frontend

    networks:
      - app-network              # Same network → enables service-to-service communication

    # Optional (if using env-based API URL)
    # environment:
    #   - REACT_APP_API_URL=http://backend:5000/api

# -----------------------------
# Custom Network
# -----------------------------
networks:
  app-network:
    driver: bridge               # Default Docker network driver
