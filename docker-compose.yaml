# Complete Docker Compose for E-Commerce App
version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6
    container_name: ecommerce-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongodb_data:/data/db
      - ./database/init-data.js:/docker-entrypoint-initdb.d/init-data.js:ro
    networks:
      - ecommerce-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/ecommerce?authSource=admin
      JWT_SECRET: your_super_secret_jwt_key_change_in_production
      NODE_ENV: production
    depends_on:
      - mongodb
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - ecommerce-network

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - ecommerce-network

# Named volumes for persistent data
volumes:
  mongodb_data:
    driver: local
  backend_uploads:
    driver: local

# Custom network for service communication
networks:
  ecommerce-network:
    driver: bridge
